<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout — Decorisa</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="site-header" id="site-header" style="position:relative">
  <div class="header-inner">
    <a href="index.html" class="logo"><span class="logo-deco">Deco</span><span class="logo-risa">risa</span></a>
    <div style="display:flex;align-items:center;gap:28px">
      <span style="font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--color-text-light)">Checkout seguro</span>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
    </div>
  </div>
</header>

<div id="checkoutContent">
  <div class="checkout-wrap">
    <div class="checkout-left">
      <form id="checkoutForm">
        <div class="checkout-section">
          <h2 class="checkout-section-title">Informações de contato</h2>
          <div class="form-row">
            <div class="form-group"><label>Nome completo</label><input type="text" placeholder="Seu nome" required></div>
            <div class="form-group"><label>E-mail</label><input type="email" placeholder="seu@email.com" required></div>
          </div>
          <div class="form-group"><label>Telefone / WhatsApp</label><input type="tel" placeholder="(11) 99999-9999"></div>
        </div>

        <div class="checkout-section">
          <h2 class="checkout-section-title">Endereço de entrega</h2>
          <div class="form-group">
            <label>CEP</label>
            <input type="text" id="checkoutCep" placeholder="00000-000" maxlength="9" oninput="formatCEP(this)">
          </div>
          <div class="form-group"><label>Rua</label><input type="text" id="checkoutRua" placeholder="Rua, Avenida..."></div>
          <div class="form-row">
            <div class="form-group"><label>Número</label><input type="text" placeholder="123"></div>
            <div class="form-group"><label>Complemento</label><input type="text" placeholder="Apto, sala..."></div>
          </div>
          <div class="form-group"><label>Bairro</label><input type="text" id="checkoutBairro" placeholder="Bairro"></div>
          <div class="form-row">
            <div class="form-group"><label>Cidade</label><input type="text" id="checkoutCidade" placeholder="Cidade"></div>
            <div class="form-group"><label>Estado</label><input type="text" id="checkoutEstado" placeholder="SP" maxlength="2"></div>
          </div>
        </div>

        <div class="checkout-section">
          <h2 class="checkout-section-title">Forma de pagamento</h2>
          <div class="payment-methods">
            <label class="payment-method selected">
              <input type="radio" name="payment" value="pix" checked>
              <span>
                <strong style="display:block;font-size:14px;margin-bottom:2px">Pix</strong>
                <span style="font-size:12px;color:var(--color-text-light)">5% de desconto — pagamento instantâneo</span>
              </span>
            </label>
            <label class="payment-method">
              <input type="radio" name="payment" value="cartao">
              <span>
                <strong style="display:block;font-size:14px;margin-bottom:2px">Cartão de crédito</strong>
                <span style="font-size:12px;color:var(--color-text-light)">Em até 12× sem juros</span>
              </span>
            </label>
            <label class="payment-method">
              <input type="radio" name="payment" value="boleto">
              <span>
                <strong style="display:block;font-size:14px;margin-bottom:2px">Boleto bancário</strong>
                <span style="font-size:12px;color:var(--color-text-light)">Compensação em 1–2 dias úteis</span>
              </span>
            </label>
            <label class="payment-method">
              <input type="radio" name="payment" value="mercadopago">
              <span>
                <strong style="display:block;font-size:14px;margin-bottom:2px">Mercado Pago</strong>
                <span style="font-size:12px;color:var(--color-text-light)">Cartão, Pix ou saldo MP</span>
              </span>
            </label>
          </div>
        </div>

        <button type="submit" class="btn-primary" style="width:100%;padding:16px;font-size:12px">Confirmar pedido</button>
        <p style="font-size:11px;color:var(--color-text-light);text-align:center;margin-top:16px;line-height:1.6">
          Ao confirmar, você concorda com nossos <a href="#" style="color:var(--color-text)">Termos de uso</a> e <a href="#" style="color:var(--color-text)">Política de privacidade</a>.
        </p>
      </form>
    </div>

    <div class="checkout-right">
      <div class="checkout-summary">
        <h2 class="checkout-summary-title">Resumo do pedido</h2>
        <div class="checkout-items" id="checkoutItems">
          <p style="font-size:13px;color:var(--color-text-light)">Carregando...</p>
        </div>
        <div class="checkout-totals">
          <div class="total-row"><span>Subtotal</span><span id="checkoutSubtotal">—</span></div>
          <div class="total-row"><span>Frete</span><span>Calculado acima</span></div>
          <div class="total-row total-final"><span>Total</span><span id="checkoutTotal">—</span></div>
        </div>
        <div style="margin-top:20px;padding-top:16px;border-top:0.5px solid var(--color-border)">
          <div style="display:flex;align-items:center;gap:8px;font-size:12px;color:var(--color-text-light);margin-bottom:8px">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
            Pagamento 100% seguro
          </div>
          <div style="display:flex;align-items:center;gap:8px;font-size:12px;color:var(--color-text-light)">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 11 19.79 19.79 0 012 2.41 2 2 0 014 .21h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z"/></svg>
            Suporte pelo WhatsApp
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast" role="alert" aria-live="polite"></div>
<script src="app.js"></script>
</body>
</html>
