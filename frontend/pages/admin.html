<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>Admin — Decorisa</title>
<link rel="icon" type="image/svg+xml" href="../assets/svg/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<script>window.DECORISA_API_URL = 'https://decorisa-api.onrender.com/api';</script>
<style>
.admin-layout { display:flex; min-height:100vh; }
.admin-sidebar {
  width:220px;flex-shrink:0;background:var(--color-bg-dark);
  display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;
}
.admin-sidebar-logo { padding:28px 24px 24px;border-bottom:0.5px solid rgba(255,255,255,0.06); }
.admin-sidebar-logo .logo { font-size:20px; }
.admin-sidebar-logo .logo .logo-deco { color:#F0EBE3; }
.admin-sidebar-logo .logo .logo-risa { color:#7A7468; }
.admin-sidebar-logo small { display:block;font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:#4A4840;margin-top:6px; }
.sidebar-nav { flex:1;padding:12px 0; }
.sidebar-link {
  display:flex;align-items:center;gap:12px;width:100%;padding:12px 24px;
  font-size:11px;letter-spacing:0.08em;text-transform:uppercase;
  color:#5A5650;background:none;border:none;border-left:2px solid transparent;
  cursor:pointer;font-family:var(--font-body);text-align:left;transition:all 0.2s;
}
.sidebar-link:hover { color:#C4BAA8;background:rgba(255,255,255,0.03); }
.sidebar-link.active { color:#F0EBE3;background:rgba(255,255,255,0.06);border-left-color:#C4BAA8; }
.sidebar-link svg { flex-shrink:0;opacity:0.7; }
.sidebar-footer { padding:16px 24px;border-top:0.5px solid rgba(255,255,255,0.06); }
.admin-main { flex:1;min-width:0;display:flex;flex-direction:column; }
.admin-topbar { background:var(--color-bg);border-bottom:0.5px solid var(--color-border);padding:16px 36px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50; }
.admin-topbar h1 { font-family:var(--font-display);font-size:24px;font-weight:300; }
.admin-body { padding:32px 36px;flex:1; }
.admin-panel { display:none; }
.admin-panel.active { display:block; }
.metric-card { background:var(--color-bg-alt);border:0.5px solid var(--color-border);padding:20px 24px; }
.metric-label { font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--color-text-light);margin-bottom:8px; }
.metric-value { font-family:var(--font-display);font-size:32px;font-weight:300;color:var(--color-text); }
.metric-sub { font-size:11px;color:var(--color-text-light);margin-top:4px; }
.bar-chart { display:flex;align-items:flex-end;gap:8px;height:80px;margin-top:12px; }
.bar-col { flex:1;display:flex;flex-direction:column;align-items:center;gap:4px; }
.bar { width:100%;background:var(--color-bg);position:relative;border-radius:1px; }
.bar-fill { position:absolute;bottom:0;left:0;right:0;background:var(--color-concrete);border-radius:1px;transition:height 0.6s ease; }
.bar-lbl { font-size:9px;color:var(--color-text-light);letter-spacing:0.04em; }
@media(max-width:768px){
  .admin-layout { flex-direction:column; }
  .admin-sidebar { width:100%;height:auto;position:relative; }
  .sidebar-nav { display:flex;overflow-x:auto;padding:4px 0; }
  .sidebar-link { white-space:nowrap;border-left:none;border-bottom:2px solid transparent; }
  .sidebar-link.active { border-bottom-color:#C4BAA8;border-left:none; }
  .admin-body { padding:20px; }
}
</style>
</head>
<body>

<div class="admin-layout">
  <!-- SIDEBAR -->
  <aside class="admin-sidebar">
    <div class="admin-sidebar-logo">
      <a href="../index.html" class="logo"><span class="logo-deco">Deco</span><span class="logo-risa">risa</span></a>
      <small>Painel Admin</small>
    </div>
    <nav class="sidebar-nav">
      <button class="sidebar-link active" data-panel="dashboard" onclick="switchPanel(this)">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Dashboard
      </button>
      <button class="sidebar-link" data-panel="pedidos" onclick="switchPanel(this)">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
        Pedidos
      </button>
      <button class="sidebar-link" data-panel="produtos" onclick="switchPanel(this)">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg>
        Produtos
      </button>
      <button class="sidebar-link" data-panel="cadastro" onclick="switchPanel(this)">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        Novo produto
      </button>
      <button class="sidebar-link" data-panel="clientes" onclick="switchPanel(this)">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
        Clientes
      </button>
      <button class="sidebar-link" data-panel="cupons" onclick="switchPanel(this)">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
        Cupons
      </button>
      <button class="sidebar-link" data-panel="banners" onclick="switchPanel(this)">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        Banners
      </button>
    </nav>
    <div class="sidebar-footer">
      <a href="../index.html" style="font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:#4A4840;display:flex;align-items:center;gap:8px">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>Ver loja
      </a>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="admin-main">
    <div class="admin-topbar">
      <h1 id="adminTitle">Dashboard</h1>
      <div style="display:flex;align-items:center;gap:16px">
        <span style="font-size:12px;color:var(--color-text-light)" id="adminUserLabel">—</span>
        <button onclick="api.auth.logout()" style="font-size:11px;letter-spacing:0.08em;text-transform:uppercase;background:none;border:none;cursor:pointer;color:var(--color-text-light);font-family:var(--font-body)">Sair</button>
      </div>
    </div>

    <div class="admin-body">

      <!-- DASHBOARD -->
      <div class="admin-panel active" id="panel-dashboard">
        <div id="metricsGrid" style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px"></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:28px">
          <div style="background:var(--color-bg-alt);border:0.5px solid var(--color-border);padding:24px">
            <div class="metric-label">Receita últimos 5 meses</div>
            <div class="bar-chart" id="revenueChart"></div>
          </div>
          <div style="background:var(--color-bg-alt);border:0.5px solid var(--color-border);padding:24px">
            <div class="metric-label">Pedidos recentes</div>
            <div id="recentOrders" style="margin-top:12px"></div>
          </div>
        </div>
        <div style="background:var(--color-bg-alt);border:0.5px solid var(--color-border);padding:24px">
          <div class="metric-label" style="margin-bottom:12px">Alertas de estoque baixo</div>
          <div id="stockAlerts"></div>
        </div>
      </div>

      <!-- PEDIDOS -->
      <div class="admin-panel" id="panel-pedidos">
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;align-items:center">
          <button class="filter-btn active" onclick="filterOrders(this,'')">Todos</button>
          <button class="filter-btn" onclick="filterOrders(this,'pending')">Pendente</button>
          <button class="filter-btn" onclick="filterOrders(this,'confirmed')">Confirmado</button>
          <button class="filter-btn" onclick="filterOrders(this,'in_production')">Em produção</button>
          <button class="filter-btn" onclick="filterOrders(this,'shipped')">Enviado</button>
          <button class="filter-btn" onclick="filterOrders(this,'delivered')">Entregue</button>
          <input type="search" id="orderSearch" placeholder="Buscar pedido ou cliente..."
            oninput="searchOrders(this.value)"
            style="margin-left:auto;border:0.5px solid var(--color-border-mid);padding:8px 14px;font-size:12px;font-family:var(--font-body);color:var(--color-text);background:var(--color-bg);width:220px;outline:none">
        </div>
        <div id="ordersTable" style="overflow-x:auto"></div>
        <div id="ordersPagination" style="display:flex;gap:8px;margin-top:20px;justify-content:center"></div>
      </div>

      <!-- PRODUTOS -->
      <div class="admin-panel" id="panel-produtos">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
          <span id="prodCountLabel" style="font-size:13px;color:var(--color-text-light)"></span>
          <button onclick="switchPanel(document.querySelector('[data-panel=cadastro]'))" class="btn-primary" style="font-size:10px;padding:10px 20px">+ Novo produto</button>
        </div>
        <div id="productsTable" style="overflow-x:auto"></div>
      </div>

      <!-- CADASTRO PRODUTO -->
      <div class="admin-panel" id="panel-cadastro">
        <h2 style="font-family:var(--font-display);font-size:26px;font-weight:300;margin-bottom:28px" id="cadastroTitle">Novo produto</h2>
        <form id="produtoForm" onsubmit="saveProduto(event)" style="max-width:680px">
          <input type="hidden" id="editingProductId">
          <div class="form-row">
            <div class="form-group"><label>Nome *</label><input type="text" id="pName" required placeholder="Ex: Vaso Bruto N.º 13"></div>
            <div class="form-group"><label>SKU *</label><input type="text" id="pSku" required placeholder="DEC-XX-000"></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label>Slug (URL) *</label><input type="text" id="pSlug" required placeholder="vaso-bruto-13"></div>
            <div class="form-group"><label>Categoria</label>
              <select id="pCategory">
                <option value="">Selecionar</option>
                <option value="vasos">Vasos</option>
                <option value="bandejas">Bandejas</option>
                <option value="esferas">Esferas</option>
                <option value="kits">Kits</option>
                <option value="personalizados">Personalizados</option>
              </select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group"><label>Preço (R$) *</label><input type="number" id="pPrice" step="0.01" min="0" required placeholder="0,00"></div>
            <div class="form-group"><label>Preço Pix (R$)</label><input type="number" id="pPricePix" step="0.01" min="0" placeholder="0,00"></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label>Estoque *</label><input type="number" id="pStock" min="0" required placeholder="0"></div>
            <div class="form-group"><label>Prazo (dias úteis)</label><input type="number" id="pDays" min="1" value="7" placeholder="7"></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label>Material</label><input type="text" id="pMaterial" placeholder="Concreto premium"></div>
            <div class="form-group"><label>Dimensões</label><input type="text" id="pDimensions" placeholder="12 × 28 cm"></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label>Peso</label><input type="text" id="pWeight" placeholder="1,8 kg"></div>
            <div class="form-group"><label>Acabamento</label><input type="text" id="pFinish" placeholder="Selado fosco"></div>
          </div>
          <div class="form-group"><label>Badge</label><input type="text" id="pBadge" placeholder="Novo, Exclusivo... (deixe vazio para nenhum)"></div>
          <div class="form-group"><label>Descrição</label><textarea id="pDesc" rows="4" placeholder="Descrição emocional da peça..."></textarea></div>
          <div style="display:flex;gap:20px;margin-bottom:20px;flex-wrap:wrap">
            <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer">
              <input type="checkbox" id="pFeatured" style="accent-color:var(--color-text)"> Destaque na home
            </label>
            <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer">
              <input type="checkbox" id="pActive" checked style="accent-color:var(--color-text)"> Produto ativo
            </label>
          </div>
          <p id="produtoFormMsg" style="font-size:12px;min-height:16px;margin-bottom:12px"></p>
          <div style="display:flex;gap:12px;flex-wrap:wrap">
            <button type="submit" class="btn-primary" id="produtoSaveBtn">Salvar produto</button>
            <button type="button" class="btn-ghost" onclick="resetProdutoForm()">Limpar</button>
          </div>
        </form>
      </div>

      <!-- CLIENTES -->
      <div class="admin-panel" id="panel-clientes">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
          <span id="clientesLabel" style="font-size:13px;color:var(--color-text-light)"></span>
          <input type="search" placeholder="Buscar cliente..." oninput="searchClientes(this.value)"
            style="border:0.5px solid var(--color-border-mid);padding:8px 14px;font-size:12px;font-family:var(--font-body);color:var(--color-text);background:var(--color-bg);width:220px;outline:none">
        </div>
        <div id="clientesTable" style="overflow-x:auto"></div>
      </div>

      <!-- CUPONS -->
      <div class="admin-panel" id="panel-cupons">
        <div style="display:grid;grid-template-columns:1fr 360px;gap:28px;align-items:start">
          <div>
            <div style="margin-bottom:20px;display:flex;justify-content:space-between;align-items:center">
              <span style="font-size:13px;color:var(--color-text-light)" id="cuponsLabel"></span>
            </div>
            <div id="cuponsTable" style="overflow-x:auto"></div>
          </div>
          <div style="background:var(--color-bg-alt);border:0.5px solid var(--color-border);padding:24px">
            <h3 style="font-family:var(--font-display);font-size:20px;font-weight:400;margin-bottom:20px">Novo cupom</h3>
            <form onsubmit="createCupom(event)" style="display:flex;flex-direction:column;gap:14px">
              <div class="form-group"><label>Código *</label><input type="text" id="cupCode" placeholder="NATAL25" required style="text-transform:uppercase" oninput="this.value=this.value.toUpperCase()"></div>
              <div class="form-group"><label>Tipo</label><select id="cupType"><option value="percent">Percentual (%)</option><option value="fixed">Valor fixo (R$)</option></select></div>
              <div class="form-group"><label>Valor *</label><input type="number" id="cupValue" step="0.01" min="0.01" required placeholder="10"></div>
              <div class="form-group"><label>Pedido mínimo (R$)</label><input type="number" id="cupMin" step="0.01" min="0" placeholder="0,00" value="0"></div>
              <div class="form-group"><label>Máx. de usos</label><input type="number" id="cupMaxUses" min="1" placeholder="Ilimitado"></div>
              <div class="form-group"><label>Validade</label><input type="date" id="cupExpires"></div>
              <button type="submit" class="btn-primary">Criar cupom</button>
            </form>
          </div>
        </div>
      </div>

      <!-- BANNERS -->
      <div class="admin-panel" id="panel-banners">
        <h2 style="font-family:var(--font-display);font-size:26px;font-weight:300;margin-bottom:24px">Gerenciar banners</h2>
        <div id="bannersContent"></div>
      </div>

    </div>
  </div>
</div>

<div class="toast" id="toast" role="alert" aria-live="polite"></div>

<script src="../js/api.js"></script>
<script src="../js/cart.js"></script>
<script src="../js/main.js"></script>
<script>
(async () => {
  /* Proteção admin */
  if (!Auth.isLoggedIn()) { window.location.href = 'cliente.html'; return; }
  const user = Auth.getUser();
  if (user?.role !== 'admin') { showToast('Acesso restrito.'); setTimeout(() => window.location.href = 'cliente.html', 1500); return; }
  document.getElementById('adminUserLabel').textContent = user.name;

  /* === SWITCH PANEL === */
  const TITLES = { dashboard:'Dashboard', pedidos:'Pedidos', produtos:'Produtos', cadastro:'Novo produto', clientes:'Clientes', cupons:'Cupons', banners:'Banners' };

  window.switchPanel = (btn) => {
    const panelId = btn.dataset.panel;
    document.querySelectorAll('.sidebar-link').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.admin-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(`panel-${panelId}`)?.classList.add('active');
    document.getElementById('adminTitle').textContent = TITLES[panelId] || panelId;
    LOADERS[panelId]?.();
  };

  /* === LOADERS === */
  const LOADERS = {
    dashboard: loadDashboard,
    pedidos:   loadPedidos,
    produtos:  loadProdutos,
    clientes:  loadClientes,
    cupons:    loadCupons,
    banners:   loadBanners,
  };

  /* === DASHBOARD === */
  async function loadDashboard() {
    try {
      const [{ metrics }, { products: lowStock }, { orders: recent }] = await Promise.all([
        api.admin.metrics(),
        api.admin.lowStock(),
        api.orders.list({ limit: 5 }),
      ]);

      document.getElementById('metricsGrid').innerHTML = [
        { label:'Receita total', value:`R$ ${Number(metrics.revenue).toLocaleString('pt-BR',{minimumFractionDigits:2})}`, sub:'Pedidos pagos' },
        { label:'Total de pedidos', value: metrics.total_orders, sub:`${metrics.pending_orders} em aberto` },
        { label:'Produtos ativos', value: metrics.total_products, sub:'No catálogo' },
        { label:'Clientes', value: metrics.total_clients, sub:'Cadastrados' },
      ].map(m => `
        <div class="metric-card">
          <div class="metric-label">${m.label}</div>
          <div class="metric-value">${m.value}</div>
          <div class="metric-sub">${m.sub}</div>
        </div>
      `).join('');

      /* Gráfico de barras simulado */
      const months = ['Jan','Fev','Mar','Abr','Mai'];
      const vals   = [42, 58, 35, 75, 100];
      document.getElementById('revenueChart').innerHTML = months.map((m,i) => `
        <div class="bar-col">
          <div class="bar" style="height:60px"><div class="bar-fill" style="height:${vals[i]}%"></div></div>
          <div class="bar-lbl">${m}</div>
        </div>
      `).join('');

      document.getElementById('recentOrders').innerHTML = (recent || []).map(o => `
        <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:0.5px solid var(--color-border)">
          <div>
            <div style="font-size:11px;color:var(--color-text-light)">${o.order_number}</div>
            <div style="font-size:13px">${o.customer_name}</div>
          </div>
          <div style="text-align:right">
            <div style="font-size:13px;font-weight:500">${fmtPrice(o.total)}</div>
            ${statusBadge(o.status)}
          </div>
        </div>
      `).join('');

      document.getElementById('stockAlerts').innerHTML = lowStock?.length
        ? lowStock.map(p => `
          <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:0.5px solid var(--color-border)">
            <div>
              <span style="font-size:13px">${p.name}</span>
              <span style="font-size:11px;color:var(--color-text-light);margin-left:10px">${p.sku}</span>
            </div>
            <span style="font-size:10px;padding:3px 8px;background:rgba(180,146,74,0.15);color:#7A5A18">${p.stock} restantes</span>
          </div>
        `).join('')
        : '<p style="font-size:13px;color:#4A7A4A">✓ Todos os produtos com estoque adequado.</p>';
    } catch (err) { showToast('Erro ao carregar dashboard: ' + err.message); }
  }

  /* === PEDIDOS === */
  let orderFilter = '';
  let orderPage   = 1;

  window.filterOrders = (btn, status) => {
    document.querySelectorAll('#panel-pedidos .filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    orderFilter = status;
    orderPage   = 1;
    loadPedidos();
  };

  window.searchOrders = (q) => { orderPage = 1; loadPedidos(q); };

  async function loadPedidos(search = '') {
    const el = document.getElementById('ordersTable');
    try {
      const { orders, total } = await api.orders.list({ status: orderFilter || undefined, page: orderPage, limit: 15, search });
      el.innerHTML = `
        <table class="admin-table">
          <thead><tr><th>Pedido</th><th>Cliente</th><th>Total</th><th>Status</th><th>Pagamento</th><th>Data</th><th>Ações</th></tr></thead>
          <tbody>
            ${(orders || []).map(o => `
              <tr>
                <td style="font-size:12px;color:var(--color-text-light)">${o.order_number}</td>
                <td><div style="font-size:13px">${o.customer_name}</div><div style="font-size:11px;color:var(--color-text-light)">${o.customer_email}</div></td>
                <td style="font-weight:500">${fmtPrice(o.total)}</td>
                <td>${statusBadge(o.status)}</td>
                <td><span style="font-size:11px;color:var(--color-text-light)">${o.payment_status}</span></td>
                <td style="font-size:12px;color:var(--color-text-light)">${fmtDate(o.created_at)}</td>
                <td>
                  <select onchange="updateOrderStatus('${o.id}', this.value)" style="font-size:11px;border:0.5px solid var(--color-border-mid);padding:4px 8px;background:var(--color-bg);font-family:var(--font-body);color:var(--color-text);cursor:pointer">
                    <option value="">Alterar</option>
                    <option value="confirmed">Confirmado</option>
                    <option value="in_production">Em produção</option>
                    <option value="shipped">Enviado</option>
                    <option value="delivered">Entregue</option>
                    <option value="cancelled">Cancelado</option>
                  </select>
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
      const pages = Math.ceil(total / 15);
      document.getElementById('ordersPagination').innerHTML = pages > 1
        ? Array.from({length:pages},(_,i)=>i+1).map(p =>
            `<button onclick="orderPage=${p};loadPedidos()" class="${p===orderPage?'btn-primary':'btn-outline'}" style="font-size:10px;padding:7px 13px;min-width:34px">${p}</button>`
          ).join('') : '';
    } catch { el.innerHTML = '<p style="color:#A33;font-size:13px">Erro ao carregar pedidos.</p>'; }
  }

  window.updateOrderStatus = async (id, status) => {
    if (!status) return;
    let trackingCode = null;
    if (status === 'shipped') trackingCode = prompt('Código de rastreio (opcional):');
    try {
      await api.orders.updateStatus(id, { status, tracking_code: trackingCode || undefined });
      showToast('Status atualizado!');
      loadPedidos();
    } catch (err) { showToast(err.message); }
  };

  /* === PRODUTOS === */
  async function loadProdutos() {
    const el = document.getElementById('productsTable');
    try {
      const { products, total } = await api.products.list({ limit: 50 });
      document.getElementById('prodCountLabel').textContent = `${total} produtos`;
      el.innerHTML = `
        <table class="admin-table">
          <thead><tr><th>SKU</th><th>Nome</th><th>Categoria</th><th>Preço</th><th>Estoque</th><th>Status</th><th>Ações</th></tr></thead>
          <tbody>
            ${(products || []).map(p => `
              <tr>
                <td style="font-size:11px;color:var(--color-text-light)">${p.sku}</td>
                <td>${p.name}</td>
                <td style="text-transform:capitalize">${p.category?.name || '—'}</td>
                <td>${Number(p.price) === 0 ? 'Sob consulta' : fmtPrice(p.price)}</td>
                <td>${p.stock < 5 ? `<span style="color:#8A5A18">${p.stock}</span>` : p.stock}</td>
                <td>${p.active ? '<span style="color:#4A7A4A;font-size:11px">Ativo</span>' : '<span style="color:#A33;font-size:11px">Inativo</span>'}</td>
                <td style="display:flex;gap:10px">
                  <button onclick="editProduct('${p.id}','${p.name}','${p.sku}','${p.slug}',${p.price},${p.stock},'${p.description||''}',${p.featured},${p.active})" style="font-size:10px;letter-spacing:0.08em;text-transform:uppercase;background:none;border:none;cursor:pointer;color:var(--color-text-muted);font-family:var(--font-body)">Editar</button>
                  <button onclick="toggleProduct('${p.id}',${!p.active})" style="font-size:10px;letter-spacing:0.08em;text-transform:uppercase;background:none;border:none;cursor:pointer;color:#A33;font-family:var(--font-body)">${p.active ? 'Desativar' : 'Ativar'}</button>
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    } catch { el.innerHTML = '<p style="color:#A33;font-size:13px">Erro ao carregar produtos.</p>'; }
  }

  window.editProduct = (id, name, sku, slug, price, stock, desc, featured, active) => {
    switchPanel(document.querySelector('[data-panel=cadastro]'));
    document.getElementById('cadastroTitle').textContent = 'Editar produto';
    document.getElementById('editingProductId').value = id;
    document.getElementById('pName').value = name;
    document.getElementById('pSku').value  = sku;
    document.getElementById('pSlug').value = slug;
    document.getElementById('pPrice').value = price;
    document.getElementById('pStock').value = stock;
    document.getElementById('pDesc').value  = desc;
    document.getElementById('pFeatured').checked = featured;
    document.getElementById('pActive').checked   = active;
    document.getElementById('produtoSaveBtn').textContent = 'Atualizar produto';
  };

  window.toggleProduct = async (id, active) => {
    try { await api.products.update(id, { active }); showToast(`Produto ${active ? 'ativado' : 'desativado'}.`); loadProdutos(); }
    catch (err) { showToast(err.message); }
  };

  window.saveProduto = async (e) => {
    e.preventDefault();
    const msg = document.getElementById('produtoFormMsg');
    const editId = document.getElementById('editingProductId').value;
    const payload = {
      name: document.getElementById('pName').value,
      sku:  document.getElementById('pSku').value,
      slug: document.getElementById('pSlug').value,
      price:    parseFloat(document.getElementById('pPrice').value) || 0,
      price_pix: parseFloat(document.getElementById('pPricePix').value) || null,
      stock:   parseInt(document.getElementById('pStock').value) || 0,
      production_days: parseInt(document.getElementById('pDays').value) || 7,
      material:   document.getElementById('pMaterial').value || null,
      dimensions: document.getElementById('pDimensions').value || null,
      weight:     document.getElementById('pWeight').value || null,
      finish:     document.getElementById('pFinish').value || null,
      badge:      document.getElementById('pBadge').value || null,
      description: document.getElementById('pDesc').value || null,
      featured: document.getElementById('pFeatured').checked,
      active:   document.getElementById('pActive').checked,
    };
    try {
      editId
        ? await api.products.update(editId, payload)
        : await api.products.create(payload);
      msg.textContent = `✓ Produto ${editId ? 'atualizado' : 'criado'} com sucesso!`;
      msg.style.color = '#4A7A4A';
      resetProdutoForm();
      setTimeout(() => { msg.textContent = ''; }, 3000);
    } catch (err) {
      msg.textContent = err.message;
      msg.style.color = '#A33';
    }
  };

  window.resetProdutoForm = () => {
    document.getElementById('produtoForm').reset();
    document.getElementById('editingProductId').value = '';
    document.getElementById('cadastroTitle').textContent = 'Novo produto';
    document.getElementById('produtoSaveBtn').textContent = 'Salvar produto';
  };

  /* === CLIENTES === */
  async function loadClientes(search = '') {
    const el = document.getElementById('clientesTable');
    try {
      const { clients, total } = await api.admin.clients({ search });
      document.getElementById('clientesLabel').textContent = `${total} clientes`;
      el.innerHTML = `
        <table class="admin-table">
          <thead><tr><th>Nome</th><th>E-mail</th><th>Telefone</th><th>Cadastrado em</th></tr></thead>
          <tbody>
            ${(clients || []).map(c => `
              <tr>
                <td>${c.name}</td>
                <td style="font-size:12px;color:var(--color-text-muted)">${c.email}</td>
                <td style="font-size:12px;color:var(--color-text-light)">${c.phone || '—'}</td>
                <td style="font-size:12px;color:var(--color-text-light)">${fmtDate(c.created_at)}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    } catch { el.innerHTML = '<p style="color:#A33;font-size:13px">Erro ao carregar clientes.</p>'; }
  }

  window.searchClientes = (q) => loadClientes(q);

  /* === CUPONS === */
  async function loadCupons() {
    const el = document.getElementById('cuponsTable');
    try {
      const { coupons } = await api.coupons.list();
      document.getElementById('cuponsLabel').textContent = `${coupons?.length || 0} cupons`;
      el.innerHTML = `
        <table class="admin-table">
          <thead><tr><th>Código</th><th>Tipo</th><th>Valor</th><th>Usos</th><th>Validade</th><th>Status</th><th>Ações</th></tr></thead>
          <tbody>
            ${(coupons || []).map(c => `
              <tr>
                <td><strong>${c.code}</strong></td>
                <td style="font-size:12px">${c.type === 'percent' ? `${c.value}%` : fmtPrice(c.value)}</td>
                <td style="font-size:12px">${c.type}</td>
                <td style="font-size:12px">${c.used_count}${c.max_uses ? ` / ${c.max_uses}` : ''}</td>
                <td style="font-size:12px;color:var(--color-text-light)">${c.expires_at ? fmtDate(c.expires_at) : 'Sem validade'}</td>
                <td>${c.active ? '<span style="font-size:10px;padding:2px 8px;background:rgba(74,120,74,0.1);color:#2A6A2A">Ativo</span>' : '<span style="font-size:10px;padding:2px 8px;background:rgba(160,60,60,0.1);color:#A33">Inativo</span>'}</td>
                <td>
                  <button onclick="toggleCupom('${c.id}',${!c.active})"
                    style="font-size:10px;letter-spacing:0.08em;text-transform:uppercase;background:none;border:none;cursor:pointer;color:${c.active?'#A33':'#4A7A4A'};font-family:var(--font-body)">
                    ${c.active ? 'Desativar' : 'Ativar'}
                  </button>
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    } catch { el.innerHTML = '<p style="color:#A33;font-size:13px">Erro ao carregar cupons.</p>'; }
  }

  window.createCupom = async (e) => {
    e.preventDefault();
    try {
      await api.coupons.create({
        code:      document.getElementById('cupCode').value,
        type:      document.getElementById('cupType').value,
        value:     parseFloat(document.getElementById('cupValue').value),
        min_order: parseFloat(document.getElementById('cupMin').value) || 0,
        max_uses:  parseInt(document.getElementById('cupMaxUses').value) || null,
        expires_at:document.getElementById('cupExpires').value || null,
      });
      showToast('Cupom criado!');
      e.target.reset();
      loadCupons();
    } catch (err) { showToast(err.message); }
  };

  window.toggleCupom = async (id, active) => {
    try { await api.coupons.toggle(id, active); loadCupons(); showToast(`Cupom ${active ? 'ativado' : 'desativado'}.`); }
    catch (err) { showToast(err.message); }
  };

  /* === BANNERS === */
  async function loadBanners() {
    const el = document.getElementById('bannersContent');
    try {
      const { banners } = await api.admin.banners();
      el.innerHTML = (banners || []).map(b => `
        <div style="border:0.5px solid var(--color-border);padding:24px;margin-bottom:20px;max-width:600px">
          <div style="font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--color-text-light);margin-bottom:12px">
            ${b.position} ${b.active ? '· <span style="color:#4A7A4A">Ativo</span>' : '· <span style="color:#A33">Inativo</span>'}
          </div>
          <form onsubmit="saveBanner(event,'${b.id}')" style="display:flex;flex-direction:column;gap:12px">
            <div class="form-group"><label>Eyebrow</label><input type="text" name="eyebrow" value="${b.eyebrow || ''}"></div>
            <div class="form-group"><label>Título</label><input type="text" name="title" value="${b.title || ''}"></div>
            <div class="form-group"><label>Subtítulo</label><textarea name="subtitle" rows="2">${b.subtitle || ''}</textarea></div>
            <div class="form-row">
              <div class="form-group"><label>Label do botão</label><input type="text" name="cta_label" value="${b.cta_label || ''}"></div>
              <div class="form-group"><label>URL do botão</label><input type="text" name="cta_url" value="${b.cta_url || ''}"></div>
            </div>
            <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer">
              <input type="checkbox" name="active" ${b.active ? 'checked' : ''} style="accent-color:var(--color-text)"> Ativo
            </label>
            <button type="submit" class="btn-primary" style="width:fit-content">Salvar banner</button>
          </form>
        </div>
      `).join('');
    } catch { el.innerHTML = '<p style="color:#A33;font-size:13px">Erro ao carregar banners.</p>'; }
  }

  window.saveBanner = async (e, id) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    try {
      await api.admin.updateBanner(id, {
        eyebrow:   fd.get('eyebrow'),
        title:     fd.get('title'),
        subtitle:  fd.get('subtitle'),
        cta_label: fd.get('cta_label'),
        cta_url:   fd.get('cta_url'),
        active:    fd.get('active') === 'on',
      });
      showToast('Banner atualizado!');
    } catch (err) { showToast(err.message); }
  };

  /* Init */
  loadDashboard();
})();
</script>
</body>
</html>
